<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考鸭-2026年高考倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 背景 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            transition: opacity 0.5s ease;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        /* 飘落花瓣 */
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 100, 100, 0.6);
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 灯笼 */
        .lantern {
            position: fixed;
            top: 0;
            z-index: 10;
            pointer-events: none;
        }

        .lantern-left {
            left: 5%;
        }

        .lantern-right {
            right: 5%;
        }

        .lantern-line {
            width: 2px;
            height: 60px;
            background: #c41e3a;
            margin: 0 auto;
        }

        .lantern-body {
            width: 60px;
            height: 75px;
            background: linear-gradient(to bottom, #dc2626, #991b1b);
            border-radius: 50%;
            position: relative;
            animation: swing 3s ease-in-out infinite;
            transform-origin: top center;
        }

        .lantern-right .lantern-body {
            animation-delay: 0.5s;
        }

        .lantern-top, .lantern-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 10px;
            background: #fbbf24;
            border-radius: 2px;
        }

        .lantern-top {
            top: -5px;
        }

        .lantern-bottom {
            bottom: -5px;
        }

        .lantern-tassels {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
        }

        .tassel {
            width: 2px;
            height: 35px;
            background: #dc2626;
        }

        .lantern-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fbbf24;
            font-size: 20px;
            font-weight: bold;
        }

        @keyframes swing {
            0%, 100% {
                transform: rotate(-3deg);
            }
            50% {
                transform: rotate(3deg);
            }
        }

        /* 新年快乐 */
        .new-year {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: none;
            gap: 15px;
        }

        .new-year.show {
            display: flex;
        }

        .new-year span {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        .new-year span:nth-child(odd) {
            color: #fbbf24;
        }

        .new-year span:nth-child(even) {
            color: #ef4444;
        }

        .new-year span:nth-child(2) { animation-delay: 0.2s; }
        .new-year span:nth-child(3) { animation-delay: 0.4s; }
        .new-year span:nth-child(4) { animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.85;
                transform: scale(1.05);
            }
        }

        /* 头部 */
        header {
            position: relative;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: rgba(59, 130, 246, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .weather {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 10px;
            min-width: 140px;
            justify-content: center;
        }

        .weather-loading {
            font-size: 14px;
            opacity: 0.8;
        }

        .weather-icon svg {
            width: 24px;
            height: 24px;
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }

        .weather-city {
            font-size: 13px;
            opacity: 0.9;
        }

        .weather-temp {
            font-size: 16px;
            font-weight: 600;
        }

        .weather-desc {
            font-size: 12px;
            opacity: 0.8;
        }

        /* 主要内容 */
        main {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 100px);
            padding: 20px;
        }

        .countdown-container {
            text-align: center;
            color: white;
        }

        .countdown-title {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .countdown-title .label {
            font-size: 32px;
            font-weight: 500;
        }

        .countdown-title .year {
            font-size: 52px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .countdown-days {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .countdown-days .number {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
            line-height: 1;
        }

        .countdown-days .unit {
            font-size: 36px;
            font-weight: 500;
        }

        .countdown-time {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 28px;
        }

        .time-item {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .time-item .num {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            min-width: 55px;
            text-align: center;
        }

        .time-item .unit {
            font-size: 20px;
            opacity: 0.9;
        }

        /* 语录 */
        .quote {
            margin-top: 50px;
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            max-width: 800px;
            padding: 0 20px;
            min-height: 80px;
        }

        .quote-loading {
            font-size: 16px;
            opacity: 0.7;
            font-style: italic;
        }

        .quote-text {
            font-size: 20px;
            line-height: 1.8;
            font-style: italic;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: opacity 0.5s ease;
        }

        .quote-source {
            margin-top: 12px;
            font-size: 15px;
            opacity: 0.75;
            transition: opacity 0.5s ease;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .logo-text {
                font-size: 18px;
            }

            .lantern {
                display: none;
            }

            .countdown-title .label {
                font-size: 22px;
            }

            .countdown-title .year {
                font-size: 36px;
            }

            .countdown-days .number {
                font-size: 80px;
            }

            .countdown-days .unit {
                font-size: 28px;
            }

            .countdown-time {
                gap: 12px;
            }

            .time-item .num {
                font-size: 32px;
                min-width: 42px;
            }

            .time-item .unit {
                font-size: 16px;
            }

            .quote-text {
                font-size: 16px;
            }

            .new-year {
                bottom: 20px;
            }

            .new-year span {
                font-size: 32px;
            }

            .weather {
                padding: 8px 12px;
                min-width: auto;
            }

            .weather-city {
                font-size: 11px;
            }

            .weather-temp {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="background" id="bg"></div>
    <div class="overlay"></div>

    <!-- 飘落花瓣 -->
    <div class="petals" id="petals"></div>

    <!-- 灯笼 -->
    <div class="lantern lantern-left">
        <div class="lantern-line"></div>
        <div class="lantern-body">
            <div class="lantern-top"></div>
            <div class="lantern-bottom"></div>
            <div class="lantern-text">年</div>
            <div class="lantern-tassels">
                <div class="tassel"></div>
                <div class="tassel"></div>
                <div class="tassel"></div>
            </div>
        </div>
    </div>

    <div class="lantern lantern-right">
        <div class="lantern-line"></div>
        <div class="lantern-body">
            <div class="lantern-top"></div>
            <div class="lantern-bottom"></div>
            <div class="lantern-text">快</div>
            <div class="lantern-tassels">
                <div class="tassel"></div>
                <div class="tassel"></div>
                <div class="tassel"></div>
            </div>
        </div>
    </div>

    <!-- 新年快乐 -->
    <div class="new-year" id="newYear">
        <span>新</span>
        <span>年</span>
        <span>快</span>
        <span>乐</span>
    </div>

    <!-- 头部 -->
    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
            </div>
            <span class="logo-text">高考鸭</span>
        </div>
        <div class="weather" id="weather">
            <span class="weather-loading">加载中...</span>
        </div>
    </header>

    <!-- 主要内容 -->
    <main>
        <div class="countdown-container">
            <div class="countdown-title">
                <span class="label">距离</span>
                <span class="year">2026</span>
                <span class="label">年高考还有</span>
            </div>
            <div class="countdown-days">
                <span class="number" id="days">--</span>
                <span class="unit">天</span>
            </div>
            <div class="countdown-time">
                <div class="time-item">
                    <span class="num" id="hours">--</span>
                    <span class="unit">小时</span>
                </div>
                <div class="time-item">
                    <span class="num" id="minutes">--</span>
                    <span class="unit">分</span>
                </div>
                <div class="time-item">
                    <span class="num" id="seconds">--</span>
                    <span class="unit">秒</span>
                </div>
            </div>
        </div>

        <div class="quote" id="quote">
            <p class="quote-loading">正在获取今日语录...</p>
        </div>
    </main>

    <script>
        // ========== 配置 ==========
        const CONFIG = {
            // 天气配置：湖南益阳安化县
            weather: {
                lat: 28.38,  // 安化县纬度
                lon: 111.21, // 安化县经度
                cityName: '安化'
            },
            // 高考日期：2026年6月7日 9:00
            gaokaoDate: new Date(2026, 5, 7, 9, 0, 0)
        };

        // ========== 工具函数 ==========
        
        // 格式化数字
        function pad(num) {
            return num.toString().padStart(2, '0');
        }

        // 获取天气图标
        function getWeatherIcon(code) {
            // WMO Weather interpretation codes
            const icons = {
                0: '☀️', // Clear sky
                1: '🌤️', // Mainly clear
                2: '⛅', // Partly cloudy
                3: '☁️', // Overcast
                45: '🌫️', // Fog
                48: '🌫️', // Depositing rime fog
                51: '🌦️', // Light drizzle
                53: '🌦️', // Moderate drizzle
                55: '🌧️', // Dense drizzle
                61: '🌧️', // Slight rain
                63: '🌧️', // Moderate rain
                65: '🌧️', // Heavy rain
                71: '🌨️', // Slight snow
                73: '🌨️', // Moderate snow
                75: '❄️', // Heavy snow
                77: '🌨️', // Snow grains
                80: '🌦️', // Slight rain showers
                81: '🌧️', // Moderate rain showers
                82: '⛈️', // Violent rain showers
                85: '🌨️', // Slight snow showers
                86: '❄️', // Heavy snow showers
                95: '⛈️', // Thunderstorm
                96: '⛈️', // Thunderstorm with slight hail
                99: '⛈️', // Thunderstorm with heavy hail
            };
            return icons[code] || '🌡️';
        }

        // 获取天气描述
        function getWeatherDesc(code) {
            const descs = {
                0: '晴朗',
                1: ' mainly clear',
                2: '多云',
                3: '阴天',
                45: '雾',
                48: '雾凇',
                51: '毛毛雨',
                53: '中雨',
                55: '大雨',
                61: '小雨',
                63: '中雨',
                65: '大雨',
                71: '小雪',
                73: '中雪',
                75: '大雪',
                77: '雪粒',
                80: '阵雨',
                81: '中阵雨',
                82: '强阵雨',
                85: '阵雪',
                86: '强阵雪',
                95: '雷雨',
                96: '雷暴伴冰雹',
                99: '强雷暴',
            };
            return descs[code] || '未知';
        }

        // ========== 数据获取 ==========

        // 1. 获取Bing每日壁纸
        async function fetchBingWallpaper() {
            try {
                const bg = document.getElementById('bg');
                // 使用多个Bing壁纸API源，增加可靠性
                const sources = [
                    'https://bing.img.run/1920x1080.php',
                    'https://api.dujin.org/bing/1920.php',
                    'https://bing.ee123.net/img/1920x1080'
                ];
                
                // 随机选择一个源
                const source = sources[Math.floor(Math.random() * sources.length)];
                bg.style.backgroundImage = `url(${source})`;
            } catch (error) {
                console.error('获取壁纸失败:', error);
                // 使用默认渐变背景
                document.getElementById('bg').style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }
        }

        // 2. 获取天气数据（Open-Meteo免费API）
        async function fetchWeather() {
            const weatherEl = document.getElementById('weather');
            
            try {
                const { lat, lon, cityName } = CONFIG.weather;
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('天气API请求失败');
                
                const data = await response.json();
                const current = data.current_weather;
                
                weatherEl.innerHTML = `
                    <div class="weather-icon">${getWeatherIcon(current.weathercode)}</div>
                    <div class="weather-info">
                        <span class="weather-city">${cityName}</span>
                        <span class="weather-temp">${Math.round(current.temperature)}°C</span>
                        <span class="weather-desc">${getWeatherDesc(current.weathercode)}</span>
                    </div>
                `;
            } catch (error) {
                console.error('获取天气失败:', error);
                weatherEl.innerHTML = `
                    <div class="weather-info">
                        <span class="weather-city">${CONFIG.weather.cityName}</span>
                        <span class="weather-temp">--°C</span>
                    </div>
                `;
            }
        }

        // 3. 获取每日语录（使用多个API源）
        async function fetchQuote() {
            const quoteEl = document.getElementById('quote');
            
            // 备用语录
            const fallbackQuotes = [
                { text: "星光不问赶路人，时光不负有心人。", source: "", author: "" },
                { text: "乾坤未定，你我皆是黑马。", source: "", author: "" },
                { text: "愿你以渺小启程，以伟大结束。", source: "", author: "" },
                { text: "既然选择了远方，便只顾风雨兼程。", source: "《热爱生命》", author: "汪国真" },
                { text: "没有比人更高的山，没有比脚更长的路。", source: "", author: "" },
            ];
            
            try {
                // 尝试获取在线语录
                const sources = [
                    // 一言API
                    async () => {
                        const res = await fetch('https://v1.hitokoto.cn/?c=k&c=d&encode=json');
                        const data = await res.json();
                        return {
                            text: data.hitokoto,
                            source: data.from || '',
                            author: data.from_who || ''
                        };
                    },
                    // 备用：使用本地随机
                    async () => {
                        return fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                    }
                ];
                
                let quote = null;
                for (const source of sources) {
                    try {
                        quote = await source();
                        if (quote && quote.text) break;
                    } catch (e) {
                        continue;
                    }
                }
                
                if (!quote) {
                    quote = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                }
                
                displayQuote(quote);
                
            } catch (error) {
                console.error('获取语录失败:', error);
                const randomQuote = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                displayQuote(randomQuote);
            }
        }

        // 显示语录
        function displayQuote(quote) {
            const quoteEl = document.getElementById('quote');
            
            let sourceHtml = '';
            if (quote.source || quote.author) {
                let parts = [];
                if (quote.source) parts.push(`《${quote.source}》`);
                if (quote.author) parts.push(`--${quote.author}`);
                sourceHtml = `<p class="quote-source">${parts.join(' ')}</p>`;
            }
            
            quoteEl.innerHTML = `
                <p class="quote-text">${quote.text}</p>
                ${sourceHtml}
            `;
        }

        // ========== 倒计时 ==========
        
        function updateCountdown() {
            const now = new Date();
            const diff = CONFIG.gaokaoDate - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = pad(hours);
            document.getElementById('minutes').textContent = pad(minutes);
            document.getElementById('seconds').textContent = pad(seconds);
        }

        // ========== 装饰效果 ==========

        // 初始化飘落花瓣
        function initPetals() {
            const container = document.getElementById('petals');
            for (let i = 0; i < 20; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDelay = Math.random() * 10 + 's';
                petal.style.animationDuration = (8 + Math.random() * 4) + 's';
                container.appendChild(petal);
            }
        }

        // 检查是否春节期间
        function checkNewYear() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const isSpringFestival = (month === 1 && day >= 20) || (month === 2 && day <= 20);
            
            if (isSpringFestival) {
                document.getElementById('newYear').classList.add('show');
            }
        }

        // ========== 初始化 ==========

        document.addEventListener('DOMContentLoaded', function() {
            // 初始化背景
            fetchBingWallpaper();
            
            // 初始化装饰
            initPetals();
            checkNewYear();
            
            // 获取在线数据
            fetchWeather();
            fetchQuote();
            
            // 启动倒计时
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            // 每5分钟刷新天气
            setInterval(fetchWeather, 5 * 60 * 1000);
            
            // 每30分钟刷新语录
            setInterval(fetchQuote, 30 * 60 * 1000);
        });
    </script>
</body>
</html>
