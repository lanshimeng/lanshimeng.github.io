<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>高考倒计时</title>
   <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           font-family: 'Roboto', 'Noto Sans SC', sans-serif;
           background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
           min-height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
           padding: 20px;
       }

       .countdown-container {
           background: rgba(255, 255, 255, 0.95);
           border-radius: 16px;
           padding: 60px 80px;
           box-shadow: 0 20px 60px rgba(0,0,0,0.3);
           text-align: center;
           max-width: 900px;
           width: 100%;
           backdrop-filter: blur(10px);
       }

       .title {
           font-size: 42px;
           font-weight: 500;
           color: #3f51b5;
           margin-bottom: 12px;
           letter-spacing: 3px;
       }

       .subtitle {
           font-size: 18px;
           color: #757575;
           margin-bottom: 50px;
           font-weight: 400;
       }

       .countdown-grid {
           display: grid;
           grid-template-columns: repeat(4, 1fr);
           gap: 30px;
           margin-bottom: 40px;
       }

       .time-card {
           background: #fff;
           border-radius: 16px;
           padding: 32px 24px;
           box-shadow: 0 4px 12px rgba(63, 81, 181, 0.15);
           border-top: 4px solid #3f51b5;
           transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
           position: relative;
           overflow: hidden;
       }

       .time-card::before {
           content: '';
           position: absolute;
           top: 0;
           left: 0;
           right: 0;
           height: 4px;
           background: linear-gradient(90deg, #3f51b5, #ff4081);
           transform: scaleX(0);
           transition: transform 0.3s ease;
       }

       .time-card:hover {
           transform: translateY(-8px);
           box-shadow: 0 12px 28px rgba(63, 81, 181, 0.25);
       }

       .time-card:hover::before {
           transform: scaleX(1);
       }

       .time-value {
           font-size: 72px;
           font-weight: 300;
           color: #3f51b5;
           line-height: 1;
           margin-bottom: 12px;
           font-variant-numeric: tabular-nums;
           font-family: 'Roboto Mono', monospace;
           letter-spacing: -2px;
       }

       .time-label {
           font-size: 16px;
           color: #757575;
           text-transform: uppercase;
           letter-spacing: 2px;
           font-weight: 500;
       }

       .status-bar {
           display: flex;
           justify-content: center;
           align-items: center;
           gap: 20px;
           margin-top: 30px;
           padding-top: 24px;
           border-top: 1px solid #e0e0e0;
       }

       .local-time {
           font-size: 14px;
           color: #757575;
           font-family: 'Roboto Mono', monospace;
       }

       @media (min-width: 1200px) {
           .countdown-container {
               padding: 80px 100px;
           }
           .time-value {
               font-size: 84px;
           }
       }

       @media (max-width: 768px) {
           .countdown-grid {
               grid-template-columns: repeat(2, 1fr);
               gap: 20px;
           }
           .time-value {
               font-size: 48px;
           }
           .title {
               font-size: 28px;
           }
       }
   </style>
</head>
<body>
   <div class="countdown-container">
       <h1 class="title">距离2026年高考</h1>
       <p class="subtitle">每一秒的努力，都是未来的基石</p>
       
       <div class="countdown-grid">
           <div class="time-card">
               <div class="time-value" id="days">000</div>
               <div class="time-label">天</div>
           </div>
           <div class="time-card">
               <div class="time-value" id="hours">00</div>
               <div class="time-label">小时</div>
           </div>
           <div class="time-card">
               <div class="time-value" id="minutes">00</div>
               <div class="time-label">分钟</div>
           </div>
           <div class="time-card">
               <div class="time-value" id="seconds">00</div>
               <div class="time-label">秒</div>
           </div>
       </div>

       <div class="status-bar">
           <div class="local-time" id="local-time">--:--:--</div>
       </div>
   </div>

   <script>
       // 配置
       const CONFIG = {
           targetDate: new Date('2026-06-07T09:00:00')
       };

       // 更新倒计时
       function updateCountdown() {
           const now = new Date();
           const diff = CONFIG.targetDate - now;

           // 更新本地时间显示
           document.getElementById('local-time').textContent = now.toLocaleTimeString('zh-CN');

           if (diff <= 0) {
               document.getElementById('days').textContent = '00';
               document.getElementById('hours').textContent = '00';
               document.getElementById('minutes').textContent = '00';
               document.getElementById('seconds').textContent = '00';
               document.querySelector('.subtitle').textContent = '高考已结束，祝你金榜题名！';
               return;
           }

           const days = Math.floor(diff / (1000 * 60 * 60 * 24));
           const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
           const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
           const seconds = Math.floor((diff % (1000 * 60)) / 1000);

           document.getElementById('days').textContent = String(days).padStart(3, '0');
           document.getElementById('hours').textContent = String(hours).padStart(2, '0');
           document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
           document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
       }

       // 初始化
       function init() {
           updateCountdown();
           setInterval(updateCountdown, 1000);
       }

       // 启动
       init();
   </script>
</body>
</html>
