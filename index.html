<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考鸭-2026年高考倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 背景 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        /* 飘落花瓣 */
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 100, 100, 0.6);
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 灯笼 */
        .lantern {
            position: fixed;
            top: 0;
            z-index: 10;
            pointer-events: none;
        }

        .lantern-left {
            left: 5%;
        }

        .lantern-right {
            right: 5%;
        }

        .lantern-line {
            width: 2px;
            height: 60px;
            background: #c41e3a;
            margin: 0 auto;
        }

        .lantern-body {
            width: 60px;
            height: 75px;
            background: linear-gradient(to bottom, #dc2626, #991b1b);
            border-radius: 50%;
            position: relative;
            animation: swing 3s ease-in-out infinite;
            transform-origin: top center;
        }

        .lantern-right .lantern-body {
            animation-delay: 0.5s;
        }

        .lantern-top, .lantern-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 10px;
            background: #fbbf24;
            border-radius: 2px;
        }

        .lantern-top {
            top: -5px;
        }

        .lantern-bottom {
            bottom: -5px;
        }

        .lantern-tassels {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
        }

        .tassel {
            width: 2px;
            height: 35px;
            background: #dc2626;
        }

        .lantern-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fbbf24;
            font-size: 20px;
            font-weight: bold;
        }

        @keyframes swing {
            0%, 100% {
                transform: rotate(-3deg);
            }
            50% {
                transform: rotate(3deg);
            }
        }

        /* 新年快乐 */
        .new-year {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: none;
            gap: 15px;
        }

        .new-year.show {
            display: flex;
        }

        .new-year span {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        .new-year span:nth-child(odd) {
            color: #fbbf24;
        }

        .new-year span:nth-child(even) {
            color: #ef4444;
        }

        .new-year span:nth-child(2) { animation-delay: 0.2s; }
        .new-year span:nth-child(3) { animation-delay: 0.4s; }
        .new-year span:nth-child(4) { animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.85;
                transform: scale(1.05);
            }
        }

        /* 头部 */
        header {
            position: relative;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: rgba(59, 130, 246, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .weather {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 10px;
        }

        .weather-icon svg {
            width: 22px;
            height: 22px;
        }

        .weather-city, .weather-temp {
            font-size: 15px;
        }

        /* 主要内容 */
        main {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 200px);
            padding: 20px;
        }

        .countdown-container {
            text-align: center;
            color: white;
        }

        .countdown-title {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .countdown-title .label {
            font-size: 32px;
            font-weight: 500;
        }

        .countdown-title .year {
            font-size: 52px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .countdown-days {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .countdown-days .number {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
            line-height: 1;
        }

        .countdown-days .unit {
            font-size: 36px;
            font-weight: 500;
        }

        .countdown-time {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 28px;
        }

        .time-item {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .time-item .num {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            min-width: 55px;
            text-align: center;
        }

        .time-item .unit {
            font-size: 20px;
            opacity: 0.9;
        }

        /* 语录 */
        .quote {
            margin-top: 50px;
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            max-width: 800px;
            padding: 0 20px;
            transition: opacity 0.5s ease;
        }

        .quote-text {
            font-size: 20px;
            line-height: 1.8;
            font-style: italic;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .quote-source {
            margin-top: 12px;
            font-size: 15px;
            opacity: 0.75;
        }

        /* 页脚 */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            text-align: center;
        }

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 6px 10px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
        }

        .footer-content a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-content a:hover {
            color: white;
        }

        .footer-content .divider {
            color: rgba(255, 255, 255, 0.4);
        }

        .footer-copyright {
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .footer-copyright a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .footer-copyright a:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .logo-text {
                font-size: 18px;
            }

            .lantern {
                display: none;
            }

            .countdown-title .label {
                font-size: 22px;
            }

            .countdown-title .year {
                font-size: 36px;
            }

            .countdown-days .number {
                font-size: 80px;
            }

            .countdown-days .unit {
                font-size: 28px;
            }

            .countdown-time {
                gap: 12px;
            }

            .time-item .num {
                font-size: 32px;
                min-width: 42px;
            }

            .time-item .unit {
                font-size: 16px;
            }

            .quote-text {
                font-size: 16px;
            }

            .new-year span {
                font-size: 32px;
            }

            .footer-content {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="background" id="bg"></div>
    <div class="overlay"></div>

    <!-- 飘落花瓣 -->
    <div class="petals" id="petals"></div>

    <!-- 灯笼 -->
    <div class="lantern lantern-left">
        <div class="lantern-line"></div>
        <div class="lantern-body">
            <div class="lantern-top"></div>
            <div class="lantern-bottom"></div>
            <div class="lantern-text">年</div>
            <div class="lantern-tassels">
                <div class="tassel"></div>
                <div class="tassel"></div>
                <div class="tassel"></div>
            </div>
        </div>
    </div>

    <div class="lantern lantern-right">
        <div class="lantern-line"></div>
        <div class="lantern-body">
            <div class="lantern-top"></div>
            <div class="lantern-bottom"></div>
            <div class="lantern-text">快</div>
            <div class="lantern-tassels">
                <div class="tassel"></div>
                <div class="tassel"></div>
                <div class="tassel"></div>
            </div>
        </div>
    </div>

    <!-- 新年快乐 -->
    <div class="new-year" id="newYear">
        <span>新</span>
        <span>年</span>
        <span>快</span>
        <span>乐</span>
    </div>

    <!-- 头部 -->
    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
            </div>
            <span class="logo-text">高考鸭</span>
        </div>
        <div class="weather" id="weather">
            <div class="weather-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.5 19c0-1.7-1.3-3-3-3c-1.1 0-2.1.6-2.6 1.5c-.5-.9-1.5-1.5-2.6-1.5c-1.7 0-3 1.3-3 3"/>
                    <path d="M17.5 19H19a4 4 0 0 0 0-8h-1.3A6 6 0 0 0 6.3 11H5a4 4 0 0 0 0 8h1.5"/>
                </svg>
            </div>
            <span class="weather-city" id="weatherCity">北京</span>
            <span class="weather-temp" id="weatherTemp">8°</span>
        </div>
    </header>

    <!-- 主要内容 -->
    <main>
        <div class="countdown-container">
            <div class="countdown-title">
                <span class="label">距离</span>
                <span class="year">2026</span>
                <span class="label">年高考还有</span>
            </div>
            <div class="countdown-days">
                <span class="number" id="days">95</span>
                <span class="unit">天</span>
            </div>
            <div class="countdown-time">
                <div class="time-item">
                    <span class="num" id="hours">00</span>
                    <span class="unit">小时</span>
                </div>
                <div class="time-item">
                    <span class="num" id="minutes">00</span>
                    <span class="unit">分</span>
                </div>
                <div class="time-item">
                    <span class="num" id="seconds">00</span>
                    <span class="unit">秒</span>
                </div>
            </div>
        </div>

        <div class="quote" id="quote">
            <p class="quote-text" id="quoteText">若你困与无风之地，我将奏响高天之歌。</p>
            <p class="quote-source" id="quoteSource">《原神》 --温迪</p>
        </div>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <a href="https://www.alongsir.cn" target="_blank">洛杉小站</a>
            <span class="divider">|</span>
            <span>Website By</span>
            <a href="https://oyiso.cn/" target="_blank">神秘布偶猫</a>
            <span>&</span>
            <span>LongSir</span>
            <span class="divider">|</span>
            <a href="https://beian.miit.gov.cn/" target="_blank">豫ICP备2022002591号-3</a>
            <span class="divider">|</span>
            <a href="#">前往旧版</a>
            <span class="divider">|</span>
            <a href="https://www.alongsir.cn/say" target="_blank">意见/问题反馈</a>
            <span class="divider">|</span>
            <a href="https://www.alongsir.cn/links" target="_blank">友情链接</a>
            <span class="divider">|</span>
            <a href="https://www.alongsir.cn/say" target="_blank">♡ 赞助我</a>
            <span class="divider">|</span>
            <span id="runtime">艰难的运行了：0年0天</span>
        </div>
        <div class="footer-copyright">
            <a href="https://bing.com" target="_blank">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle;">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                Bing-必应每日壁纸
            </a>
            <span class="divider"> | </span>
            <span>背景图片版权归属微软必应</span>
        </div>
    </footer>

    <script>
        // 语录数据
        const quotes = [
            { text: "若你困与无风之地，我将奏响高天之歌。", source: "《原神》", author: "温迪" },
            { text: "曾盛开过一朵，曾不会败落，曾在他眼中流淌过浩瀚的银河。", source: "《不痛》", author: "南语" },
            { text: "星光不问赶路人，时光不负有心人。", source: "", author: "" },
            { text: "乾坤未定，你我皆是黑马。", source: "", author: "" },
            { text: "愿你以渺小启程，以伟大结束。", source: "", author: "" },
            { text: "既然选择了远方，便只顾风雨兼程。", source: "《热爱生命》", author: "汪国真" },
            { text: "没有比人更高的山，没有比脚更长的路。", source: "", author: "" },
            { text: "你的负担将变成礼物，你受的苦将照亮你的路。", source: "", author: "泰戈尔" },
            { text: "每一个不曾起舞的日子，都是对生命的辜负。", source: "", author: "尼采" },
            { text: "追光的人，终会光芒万丈。", source: "", author: "" },
        ];

        // 天气数据
        const weatherData = [
            { city: "北京", temp: 8, icon: "cloudy" },
            { city: "上海", temp: 12, icon: "rainy" },
            { city: "广州", temp: 18, icon: "sunny" },
            { city: "深圳", temp: 20, icon: "sunny" },
            { city: "杭州", temp: 10, icon: "cloudy" },
            { city: "成都", temp: 9, icon: "windy" },
            { city: "武汉", temp: 7, icon: "cloudy" },
            { city: "西安", temp: 6, icon: "sunny" },
            { city: "南京", temp: 8, icon: "cloudy" },
            { city: "重庆", temp: 11, icon: "cloudy" },
        ];

        // 初始化背景
        function initBackground() {
            const bg = document.getElementById('bg');
            // 使用Bing每日壁纸
            bg.style.backgroundImage = 'url(https://bing.img.run/1920x1080.php)';
        }

        // 初始化飘落花瓣
        function initPetals() {
            const container = document.getElementById('petals');
            for (let i = 0; i < 20; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDelay = Math.random() * 10 + 's';
                petal.style.animationDuration = (8 + Math.random() * 4) + 's';
                container.appendChild(petal);
            }
        }

        // 检查是否春节期间
        function checkNewYear() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const isSpringFestival = (month === 1 && day >= 20) || (month === 2 && day <= 20);
            
            if (isSpringFestival) {
                document.getElementById('newYear').classList.add('show');
            }
        }

        // 初始化天气
        function initWeather() {
            const randomWeather = weatherData[Math.floor(Math.random() * weatherData.length)];
            document.getElementById('weatherCity').textContent = randomWeather.city;
            document.getElementById('weatherTemp').textContent = randomWeather.temp + '°';
        }

        // 倒计时
        function updateCountdown() {
            const now = new Date();
            const targetDate = new Date(2026, 5, 7, 9, 0, 0); // 2026年6月7日 9:00
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        // 语录轮换
        let currentQuoteIndex = 0;
        function rotateQuote() {
            const quoteEl = document.getElementById('quote');
            const textEl = document.getElementById('quoteText');
            const sourceEl = document.getElementById('quoteSource');
            
            quoteEl.style.opacity = '0';
            
            setTimeout(() => {
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
                const quote = quotes[currentQuoteIndex];
                textEl.textContent = quote.text;
                
                if (quote.source || quote.author) {
                    let sourceText = '';
                    if (quote.source) sourceText += `《${quote.source}》`;
                    if (quote.author) sourceText += ` --${quote.author}`;
                    sourceEl.textContent = sourceText;
                    sourceEl.style.display = 'block';
                } else {
                    sourceEl.style.display = 'none';
                }
                
                quoteEl.style.opacity = '1';
            }, 500);
        }

        // 运行时间
        function updateRuntime() {
            const startDate = new Date('2023-03-03');
            const now = new Date();
            const diff = now - startDate;
            
            const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
            const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365)) / (1000 * 60 * 60 * 24));
            
            document.getElementById('runtime').textContent = `艰难的运行了：${years}年${days}天`;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initBackground();
            initPetals();
            checkNewYear();
            initWeather();
            updateCountdown();
            updateRuntime();
            
            // 每秒更新倒计时
            setInterval(updateCountdown, 1000);
            
            // 每30秒轮换语录
            setInterval(rotateQuote, 30000);
            
            // 每分钟更新运行时间
            setInterval(updateRuntime, 60000);
        });
    </script>
</body>
</html>
